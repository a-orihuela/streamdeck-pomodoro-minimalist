name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  plugin:
    name: Lint, Build & Validate
    runs-on: ubuntu-latest
    # Only run if this repo has been initialized as a plugin (package.json exists at root)
    if: hashFiles('package.json') != ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Stream Deck CLI
        run: npm install -g @elgato/cli@latest

      - name: Validate plugin
        run: streamdeck validate *.sdPlugin
